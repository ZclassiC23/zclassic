# Automated security review — part 2 of 2 (the COMMENT).
#
# Triggered by `workflow_run` when "PR Security Review" finishes. This is the
# fork-safe way to comment: workflow_run ALWAYS runs the workflow file from the
# base branch in the TRUSTED base-repo context, so it may hold a write token —
# and it still NEVER checks out or executes any PR code. It only downloads the
# verdict artifact (plain text the scan produced) and posts/refreshes a comment.
# An untrusted PR therefore never gets near the write token or any secret.
name: PR Security Comment

on:
  workflow_run:
    workflows: ["PR Security Review"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download the verdict artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-security-verdict
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Post / refresh the security comment (no PR code is run)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR="$(cat pr.txt 2>/dev/null)"
          case "$PR" in ''|*[!0-9]*) echo "no PR number; nothing to comment"; exit 0;; esac
          MARK='<!-- pr-security-review -->'
          {
            echo "$MARK"
            echo "## 🔒 Automated security review"
            echo
            echo '```'
            cat scan.txt
            echo '```'
            echo
            echo "_Scope: consensus-parity (vs zclassicd) · supply-chain · secrets · dangerous calls._"
            echo "_Policy: \`docs/CONSENSUS_PARITY_DOCTRINE.md\` · scanner: \`tools/scripts/pr_security_scan.sh\`._"
          } > body.md
          # Replace any prior bot comment (marker) so PRs don't accumulate spam.
          for id in $(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                        --jq ".[] | select(.body | contains(\"$MARK\")) | .id" 2>/dev/null); do
            gh api -X DELETE "repos/$REPO/issues/comments/$id" >/dev/null 2>&1 || true
          done
          gh pr comment "$PR" --repo "$REPO" --body-file body.md || true
